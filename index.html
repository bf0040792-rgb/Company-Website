<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreEdu Tech | Root Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-check-compat.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; color: white; display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .box { 
            background: #1e293b; padding: 40px; border-radius: 12px; 
            width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; border-top: 5px solid #3b82f6;
        }
        h2 { margin-top: 0; letter-spacing: 1px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: bold;}
        input, select { 
            width: 100%; padding: 12px; border-radius: 6px; 
            border: 1px solid #334155; background: #0f172a;
            color: white; box-sizing: border-box; font-size: 15px; outline: none;
        }
        input:focus, select:focus { border-color: #3b82f6; }
        button { 
            width: 100%; padding: 14px; background: #3b82f6; 
            color: white; border: none; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #2563eb; }
        #dashboard { display: none; }
        .key-display { 
            background: #059669; padding: 20px; border-radius: 8px; 
            margin-top: 20px; font-family: monospace; font-size: 22px; 
            display: none; border: 2px dashed #a7f3d0;
        }
    </style>
</head>
<body>

    <div class="box" id="login-box">
        <h2 style="color: #3b82f6;">Root Owner Login</h2>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 25px;">Enter Super Admin credentials to access.</p>
        
        <div class="form-group">
            <input type="email" id="adminEmail" placeholder="Super Admin Email">
        </div>
        <div class="form-group">
            <input type="password" id="adminPass" placeholder="Super Admin Password">
        </div>
        
        <button onclick="loginRoot()" id="loginBtn">Secure Login</button>
        <p id="err" style="color: #ef4444; display: none; font-weight: bold; margin-top: 15px; font-size:14px;"></p>
    </div>

    <div class="box" id="dashboard">
        <h2 style="color: #22c55e;">SaaS License Generator</h2>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 25px;">Generate unique keys for client schools.</p>
        
        <div class="form-group">
            <label>Select Target School:</label>
            <select id="schoolSelect">
                <option value="">Loading schools database...</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>License Validity Plan:</label>
            <select id="validity">
                <option value="1">1 Month (Free Trial)</option>
                <option value="6">6 Months (Half-Yearly)</option>
                <option value="12">12 Months (Annual Plan)</option>
            </select>
        </div>
        
        <button onclick="generateKey()" id="genBtn">Generate Security Key</button>
        
        <div id="keyOutput" class="key-display"></div>
        
        <button onclick="location.reload()" style="background: #ef4444; margin-top: 25px;">Lock & Logout</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUAoXX64MTKrhMiRKd9oJPnaT0j60SPdY",
            authDomain: "admin-panel-17e6a.firebaseapp.com",
            databaseURL: "https://admin-panel-17e6a-default-rtdb.firebaseio.com",
            projectId: "admin-panel-17e6a",
            storageBucket: "admin-panel-17e6a.firebasestorage.app",
            messagingSenderId: "519315316570",
            appId: "1:519315316570:web:1448a0936e9a102d849d63"
        };
        firebase.initializeApp(firebaseConfig);

        const appCheck = firebase.appCheck();
        appCheck.activate('6LeAT9csAAAAANn9sBk-BPOFASXX9liQLCwwO5_4', true);

        const db = firebase.firestore();
        const auth = firebase.auth();

        // AUTHENTICATION LOGIC
        async function loginRoot() {
            const e = document.getElementById("adminEmail").value.trim();
            const p = document.getElementById("adminPass").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("err");
            
            if(!e || !p) {
                err.style.display = "block";
                err.innerText = "❌ Please enter email and password.";
                return;
            }

            btn.innerText = "Authenticating...";
            try {
                // Firebase Login
                await auth.signInWithEmailAndPassword(e, p);
                document.getElementById("login-box").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                loadSchools();
            } catch(error) {
                err.style.display = "block";
                err.innerText = "❌ Login Failed: " + error.message;
                btn.innerText = "Secure Login";
            }
        }

        // LOAD SCHOOLS FROM FIREBASE
        async function loadSchools() {
            const select = document.getElementById("schoolSelect");
            select.innerHTML = '<option value="">-- Select a School --</option>';
            try {
                const snap = await db.collection("schools").get();
                if(snap.empty) {
                    select.innerHTML = '<option value="">No schools found</option>';
                    return;
                }
                snap.forEach(doc => {
                    const data = doc.data();
                    select.innerHTML += `<option value="${doc.id}">${data.schoolName || "Unnamed School"} (${doc.id})</option>`;
                });
            } catch(e) {
                select.innerHTML = `<option value="">Error: ${e.message}</option>`;
            }
        }

        // CALL RENDER BACKEND TO GENERATE KEY
        async function generateKey() {
            const schoolSelect = document.getElementById("schoolSelect");
            const schoolId = schoolSelect.value;
            
            if(!schoolId) return alert("Please select a school first!");
            
            const schoolName = schoolSelect.options[schoolSelect.selectedIndex].text;
            const validity = document.getElementById("validity").value;
            const btn = document.getElementById("genBtn");

            btn.innerHTML = "Processing...";
            
            try {
                const response = await fetch("https://school-backend-zlgy.onrender.com/api/generate-license", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        schoolId: schoolId,
                        schoolName: schoolName,
                        validityMonths: validity,
                        masterSecret: "VETO_MASTER_2026"
                    })
                });
                
                const data = await response.json();
                
                if(data.success) {
                    const out = document.getElementById("keyOutput");
                    out.style.display = "block";
                    out.innerHTML = `✅ Key Generated:<br><b style="color:white; font-size:24px; letter-spacing:2px;">${data.licenseKey}</b><br><small style="font-size:13px; color:#d1fae5; display:block; margin-top:10px;">Valid till: ${new Date(data.expiryDate).toLocaleDateString()}</small>`;
                } else {
                    alert("Backend Error: " + data.error);
                }
            } catch(e) { 
                alert("Server Error! Check if Render backend is awake."); 
            }
            
            btn.innerHTML = "Generate Security Key";
        }
    </script>
</body>
</html>
